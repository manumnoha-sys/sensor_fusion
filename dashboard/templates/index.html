<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensor Fusion Dashboard — KV260</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #238636;
      --accent-hover: #2ea043;
      --red: #da3633;
      --yellow: #d29922;
      --blue: #58a6ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header svg { color: var(--text); }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    header .repo {
      font-size: 13px;
      color: var(--muted);
      margin-left: auto;
    }

    header .repo a { color: var(--blue); text-decoration: none; }
    header .repo a:hover { text-decoration: underline; }

    .status-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .dot.green  { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
    .dot.red    { background: var(--red); }
    .dot.yellow { background: var(--yellow); animation: pulse 1.5s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    main {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .camera-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .camera-card header {
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
    }

    .camera-card header .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 1px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      color: var(--muted);
      margin-left: 8px;
    }

    .camera-card header .badge.live {
      border-color: #3fb950;
      color: #3fb950;
    }

    .video-wrap {
      position: relative;
      background: #000;
      aspect-ratio: 16/9;
    }

    .video-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .video-wrap .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      color: var(--muted);
      font-size: 13px;
      flex-direction: column;
      gap: 8px;
    }

    .video-wrap .overlay.hidden { display: none; }

    .camera-footer {
      padding: 8px 14px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    .camera-footer .device { font-family: monospace; font-size: 11px; }

    .btn {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
    .btn:hover { background: var(--border); }

    .info-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-top: 16px;
    }

    .info-panel h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    .kv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .kv-item label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .kv-item span {
      font-size: 13px;
      font-family: monospace;
      color: var(--text);
    }
  </style>
</head>
<body>

<header>
  <!-- GitHub octocat icon -->
  <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
      0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
      -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
      .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
      -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
      1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
      1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
      1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
  </svg>
  <h1>Sensor Fusion Dashboard</h1>
  <div class="repo">
    <a href="https://github.com/manumnoha-sys/sensor_fusion" target="_blank">
      manumnoha-sys/sensor_fusion
    </a>
    &nbsp;·&nbsp; Kria KV260
  </div>
</header>

<div class="status-bar">
  <span id="kria-status"><span class="dot yellow"></span>Connecting to Kria…</span>
  <span id="cam-count"></span>
  <span style="margin-left:auto" id="last-update"></span>
</div>

<main>
  <div class="grid" id="camera-grid"></div>

  <div class="info-panel">
    <h2>Board Info</h2>
    <div class="kv-grid">
      <div class="kv-item"><label>Board</label><span>AMD/Xilinx Kria KV260</span></div>
      <div class="kv-item"><label>Kria IP</label><span>100.101.58.66</span></div>
      <div class="kv-item"><label>Stream port</label><span>:8080</span></div>
      <div class="kv-item"><label>Dashboard</label><span>NUC :5000</span></div>
      <div class="kv-item"><label>ISP Camera</label><span id="isp-status">AP1302 — pending cable fix</span></div>
      <div class="kv-item"><label>Kernel</label><span>5.15 ZynqMP</span></div>
    </div>
  </div>
</main>

<script>
  const CAMERAS = [
    { idx: 0, label: "Logitech C925e", device: "/dev/video1", res: "1280×720", fps: "30fps" },
    { idx: 1, label: "Xilinx ISP VCAP", device: "/dev/video0", res: "1920×1080", fps: "—", offline: true },
  ];

  function buildCards() {
    const grid = document.getElementById("camera-grid");
    grid.innerHTML = "";
    CAMERAS.forEach(cam => {
      const card = document.createElement("div");
      card.className = "camera-card";
      card.innerHTML = `
        <header>
          ${cam.label}
          <span class="badge ${cam.offline ? "" : "live"}">${cam.offline ? "offline" : "live"}</span>
        </header>
        <div class="video-wrap">
          ${cam.offline
            ? `<div class="overlay"><span>⚠ AP1302 offline</span><span style="font-size:11px">Reseat IAS J2 FFC cable to enable</span></div>`
            : `<img id="stream-${cam.idx}" src="/stream/${cam.idx}" alt="${cam.label}"
                 onerror="this.parentElement.querySelector('.overlay').classList.remove('hidden');this.style.display='none'">
               <div class="overlay hidden"><span>Stream unavailable</span></div>`
          }
        </div>
        <div class="camera-footer">
          <span class="device">${cam.device}</span>
          <span>${cam.res} · ${cam.fps}</span>
          ${cam.offline ? "" : `<button class="btn" onclick="snapshot(${cam.idx})">📷 Snapshot</button>`}
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function snapshot(idx) {
    window.open(`/snapshot/${idx}`, "_blank");
  }

  async function pollStatus() {
    try {
      const resp = await fetch("/cameras");
      const data = await resp.json();
      const status = document.getElementById("kria-status");
      const count = document.getElementById("cam-count");
      const update = document.getElementById("last-update");

      if (data.error) {
        status.innerHTML = `<span class="dot red"></span>Kria unreachable`;
        count.textContent = "";
      } else {
        status.innerHTML = `<span class="dot green"></span>Kria online`;
        count.textContent = `${data.cameras?.length ?? 0} camera(s) streaming`;
      }
      update.textContent = `Updated ${new Date().toLocaleTimeString()}`;
    } catch {
      document.getElementById("kria-status").innerHTML =
        `<span class="dot red"></span>Dashboard error`;
    }
  }

  buildCards();
  pollStatus();
  setInterval(pollStatus, 10000);
</script>
</body>
</html>
