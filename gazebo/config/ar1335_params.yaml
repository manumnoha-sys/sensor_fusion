# AR1335 Camera Parameters — matches ON Semi IAS module on KV260
#
# Physical sensor: 1/3.2" CMOS, 13MP (4208x3120)
# Capture mode:    1920x1080 @ 30fps (via AP1302 ISP)
# Lens:            ~3.5mm focal length, f/2.2

camera:
  model: "ON_Semi_AR1335_IAS"
  isp: "AP1302"
  interface: "MIPI_CSI2_2lane"
  v4l2_device: "/dev/video0"

  # Intrinsics (1920x1080 capture mode, estimated from sensor geometry)
  # fx = fy = (focal_length_mm / pixel_size_um) * 1000
  # AR1335 pixel pitch: 1.1 um, focal ~3.5mm → f = 3182 px
  image_width: 1920
  image_height: 1080
  fx: 1620.0
  fy: 1620.0
  cx: 960.0
  cy: 540.0

  # Distortion coefficients (Brown-Conrady model)
  # k1, k2, p1, p2, k3
  distortion: [-0.28, 0.07, 0.0, 0.0, 0.0]

  # Camera frame rate
  fps: 30

  # Field of view (horizontal, degrees)
  hfov_deg: 77.0

  # Depth range
  clip_near_m: 0.02
  clip_far_m: 300.0

  # ROS2 topics (via ros_gz_bridge)
  ros_image_topic: "/kv260/camera/image_raw"
  ros_info_topic:  "/kv260/camera/camera_info"

imu:
  model: "MPU6050_equivalent"
  update_rate_hz: 200

  # Gyroscope noise (rad/s)
  gyro_noise_stddev: 2.0e-4
  gyro_bias_stddev:  8.0e-7

  # Accelerometer noise (m/s^2)
  accel_noise_stddev: 1.7e-2
  accel_bias_stddev:  1.0e-3

  # ROS2 topic
  ros_topic: "/kv260/imu/data_raw"

# Complementary filter parameters (matches src/fusion/imu_processor.py)
fusion:
  alpha: 0.98          # gyro trust weight
  camera_fps: 30
  imu_hz: 200
